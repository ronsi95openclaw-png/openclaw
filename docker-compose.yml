version: "3.9"

services:
  openclaw:
    build: .
    container_name: openclaw-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "9090:9090"
    volumes:
      - ./data:/app/data          # state, logs, optimization — persisted
      - ./credentials.json:/app/credentials.json:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  dashboard:
    build:
      context: ./dashboard/web
      dockerfile: Dockerfile.web
    container_name: openclaw-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://openclaw:8000
    depends_on:
      openclaw:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: openclaw-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

volumes:
  prometheus_data:
