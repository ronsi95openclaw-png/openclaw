global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'openclaw'
    environment: 'production'

# ── Alertmanager integration ──────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules.yml

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # OpenClaw bot metrics (custom app metrics on port 9090)
  - job_name: 'openclaw-bot'
    static_configs:
      - targets: ['openclaw-bot:9090']
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Redis Exporter (if deployed separately; optional)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Node Exporter — host-level system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
