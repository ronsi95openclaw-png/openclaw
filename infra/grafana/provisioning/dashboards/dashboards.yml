apiVersion: 1

# ── Grafana dashboard provisioning ───────────────────────────────────────────
# Scans /var/lib/grafana/dashboards for JSON dashboard definitions.
# New dashboards dropped into that directory will be loaded on next restart.

providers:

  - name: "OpenClaw Dashboards"
    orgId: 1
    folder: "OpenClaw"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true

  - name: "Infrastructure"
    orgId: 1
    folder: "Infrastructure"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/infra
      foldersFromFilesStructure: false
