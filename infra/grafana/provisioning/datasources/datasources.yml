apiVersion: 1

# ── Grafana data source provisioning ─────────────────────────────────────────
# These sources are automatically configured on container start.
# Do not edit manually — changes will be overwritten on restart.

datasources:

  # Prometheus — metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus-openclaw
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      queryTimeout: "60s"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: loki-openclaw

  # Loki — logs
  - name: Loki
    type: loki
    access: proxy
    uid: loki-openclaw
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: prometheus-openclaw
          matcherRegex: "trade_id=(\\w+)"
          name: TradeID
          url: "$${__value.raw}"
