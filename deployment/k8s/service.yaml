---
# OpenClaw API Service
# ClusterIP — internal cluster access only.
# Expose externally via an Ingress controller or LoadBalancer override.
apiVersion: v1
kind: Service
metadata:
  name: openclaw-api
  namespace: openclaw
  labels:
    app: openclaw
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: api
      protocol: TCP
      port: 8000
      targetPort: 8000

---
# OpenClaw Dashboard Service
# ClusterIP — expose via Ingress for external access.
apiVersion: v1
kind: Service
metadata:
  name: openclaw-dashboard
  namespace: openclaw
  labels:
    app: openclaw
    component: dashboard
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: dashboard
      protocol: TCP
      port: 3000
      targetPort: 3000

