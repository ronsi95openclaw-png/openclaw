<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a1a1a" />
<title>Paper Watch · Signals</title>
<style>
  :root {
    --bg:#1a1a1a; --panel:#232323; --line:#333; --txt:#f2f2f2; --muted:#9a9a9a;
    --gold:#F5A623; --green:#3fb950; --red:#f04747; --grey:#6e7681;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  body{ max-width:560px; margin:0 auto; padding:16px 12px 40px; }
  a{ color:var(--gold); text-decoration:none; }

  header{ display:flex; align-items:center; justify-content:space-between;
    padding-bottom:12px; border-bottom:1px solid var(--line); margin-bottom:12px; }
  h1{ font-size:18px; margin:0; }
  .back{ font-size:13px; font-weight:650; }
  .meta{ font-size:12px; color:var(--muted); margin-bottom:12px; display:flex; gap:12px; }
  .meta b{ color:var(--gold); }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{ text-align:left; color:var(--muted); font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.6px; padding:6px 8px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); }
  tbody td{ padding:9px 8px; border-bottom:1px solid #2a2a2a; vertical-align:top; }
  tbody tr:last-child td{ border-bottom:none; }
  .sym{ font-weight:700; }
  .pill{ display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.4px; }
  .pill.buy{ background:rgba(63,185,80,.16); color:var(--green); border:1px solid rgba(63,185,80,.4); }
  .pill.sell{ background:rgba(240,71,71,.16); color:var(--red); border:1px solid rgba(240,71,71,.4); }
  .pill.none{ background:rgba(110,118,129,.16); color:var(--grey); border:1px solid rgba(110,118,129,.4); }
  .conf{ font-weight:650; } .conf.HIGH{ color:var(--green); } .conf.MEDIUM{ color:var(--gold); } .conf.LOW{ color:var(--grey); }
  .notes{ color:var(--muted); font-size:12px; }
  .date{ color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .empty{ text-align:center; color:var(--muted); padding:30px 0; }
  footer{ text-align:center; color:var(--grey); font-size:11px; margin-top:18px; }
</style>
</head>
<body>
  <header>
    <h1>Paper Watch · Signals</h1>
    <a class="back" href="/">← HQ</a>
  </header>
  <div class="meta"><span><b id="count">—</b> signals</span><span id="updated">updated —</span></div>

  <table>
    <thead><tr><th>Date</th><th>Symbol</th><th>Signal</th><th>Conf.</th><th>Notes</th></tr></thead>
    <tbody id="rows"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
  </table>

  <footer>Read-only · refreshes every 60s · liquidity-sweep paper watch</footer>

<script>
  function cls(action){
    const a = (action||'').toUpperCase();
    if (a === 'BUY' || a === 'LONG') return 'buy';
    if (a === 'SELL' || a === 'SHORT') return 'sell';
    return 'none'; // HOLD / NONE / anything else
  }
  function fmtDate(iso){
    if(!iso) return '—';
    const d = new Date(iso); if(isNaN(d)) return iso;
    return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  async function load(){
    try{
      const data = await (await fetch('/paper-watch')).json();
      const rows = document.getElementById('rows');
      document.getElementById('count').textContent = data.length;
      document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
      if (!data.length){ rows.innerHTML = '<tr><td colspan="5" class="empty">No signals logged yet.</td></tr>'; return; }
      rows.innerHTML = '';
      // Newest first.
      for (const e of data.slice().reverse()){
        const sig = e.signal || {};
        const action = sig.action || 'NONE';
        const conf = (sig.confidence || '').toUpperCase();
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="date">'+fmtDate(e.ts)+'</td>' +
          '<td class="sym">'+esc(e.symbol || sig.coin || '—')+'</td>' +
          '<td><span class="pill '+cls(action)+'">'+esc(action)+'</span></td>' +
          '<td class="conf '+esc(conf)+'">'+esc(conf||'—')+'</td>' +
          '<td class="notes">'+esc(sig.reason || '')+'</td>';
        rows.appendChild(tr);
      }
    }catch(e){
      document.getElementById('rows').innerHTML = '<tr><td colspan="5" class="empty">Failed to load /paper-watch</td></tr>';
    }
  }
  load();
  setInterval(load, 60000);
</script>
</body>
</html>
