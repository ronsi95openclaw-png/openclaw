name: OpenClaw Release Pipeline

# Secrets referenced (not provided automatically):
#   HALT_RELEASE_CODE — emergency halt code; not used in CI but reserved for
#                       an out-of-band kill-switch mechanism.
# Secrets provided automatically by GitHub Actions:
#   GITHUB_TOKEN      — used for GHCR login, release creation, and package
#                       write permissions.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3 — no leading v)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip validation tests (emergency use only)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  CORE_IMAGE: ghcr.io/${{ github.repository }}/openclaw-core
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository }}/openclaw-dashboard

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. VALIDATE
  # ──────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install requirements and pytest
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-timeout

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip refs/tags/v prefix from the tag ref
            VERSION=$(echo "${{ github.ref }}" | sed 's|refs/tags/v||')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Compile check — all Python files
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: |
          find . -name "*.py" \
            -not -path "./dashboard/web/*" \
            -not -path "./.git/*" \
            | xargs python -m py_compile
          echo "Compile check passed."

      - name: Run chaos tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        env:
          DEMO_MODE: "true"
        run: |
          pytest tests/chaos/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # 2. BUILD AND PUSH
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: validate
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    outputs:
      core_digest: ${{ steps.push-core.outputs.digest }}
      dashboard_digest: ${{ steps.push-dashboard.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata — openclaw-core
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CORE_IMAGE }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ env.VERSION }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ steps.sha.outputs.short_sha }}
            type=raw,value=canary-${{ github.sha }}

      - name: Build and push openclaw-core
        id: push-core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}
          # Fail fast — do not push partial layers on build error
          outputs: type=registry,push=true

      - name: Check for dashboard Dockerfile
        id: dashboard-check
        run: |
          if [ -f "dashboard/web/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "dashboard/web/Dockerfile not found — skipping dashboard image build."
          fi

      - name: Set image metadata — openclaw-dashboard
        id: meta-dashboard
        if: steps.dashboard-check.outputs.exists == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ env.VERSION }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ steps.sha.outputs.short_sha }}
            type=raw,value=canary-${{ github.sha }}

      - name: Build and push openclaw-dashboard
        id: push-dashboard
        if: steps.dashboard-check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard/web
          file: ./dashboard/web/Dockerfile
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          outputs: type=registry,push=true

  # ──────────────────────────────────────────────────────────────────────────
  # 3. VERIFY IMAGE
  # ──────────────────────────────────────────────────────────────────────────
  verify-image:
    name: Verify Image Self-Test
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull exact digest — openclaw-core
        run: |
          DIGEST="${{ needs.build-and-push.outputs.core_digest }}"
          echo "Pulling by digest: ${DIGEST}"
          docker pull "${{ env.CORE_IMAGE }}@${DIGEST}"

      - name: Run image self-test
        run: |
          DIGEST="${{ needs.build-and-push.outputs.core_digest }}"
          docker run --rm \
            -e DEMO_MODE=true \
            -e DASHBOARD_SECRET=ci \
            "${{ env.CORE_IMAGE }}@${DIGEST}" \
            python -c "
          import trading.cryptocom_bot
          import runtime.reconciliation
          print('Image OK')
          "

  # ──────────────────────────────────────────────────────────────────────────
  # 4. PUBLISH RELEASE
  # ──────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify-image
    # Only create a GitHub Release for tag-triggered runs; workflow_dispatch
    # releases are environment deploys and do not need a GH Release object.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    outputs:
      release_url: ${{ steps.create-release.outputs.html_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create-release
        # Non-fatal: a release creation failure is a warning, not a blocker,
        # because the Docker image is already pushed and verified.
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const sha = context.sha;
            const shortSha = sha.slice(0, 7);

            const body = [
              `## OpenClaw ${tag}`,
              '',
              '### Docker Images',
              `- \`ghcr.io/${{ github.repository }}/openclaw-core:${version}\``,
              `- \`ghcr.io/${{ github.repository }}/openclaw-core:${shortSha}\``,
              `- \`ghcr.io/${{ github.repository }}/openclaw-core:canary-${sha}\``,
              '',
              '### Verification',
              '- Compile check: passed',
              '- Chaos tests: passed',
              '- Image self-test: passed',
              '',
              `**Commit:** ${sha}`,
            ].join('\n');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `OpenClaw ${tag}`,
              body,
              draft: false,
              prerelease: false,
            });

            core.setOutput('html_url', release.data.html_url);
            console.log(`Release created: ${release.data.html_url}`);

      - name: Warn on release creation failure
        if: steps.create-release.outcome == 'failure'
        run: |
          echo "::warning::GitHub Release creation failed. Docker image is already \
          pushed and verified — this is non-fatal. Create the release manually if needed."

  # ──────────────────────────────────────────────────────────────────────────
  # 5. ROLLBACK TAG (informational — runs only when a required job fails)
  # ──────────────────────────────────────────────────────────────────────────
  rollback-tag:
    name: Rollback Tag (informational)
    runs-on: ubuntu-latest
    needs: [validate, build-and-push, verify-image]
    if: failure()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create informational rollback tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="rollback-${DATE}-${SHORT_SHA}"

          echo "::warning::Pipeline failed. Creating informational rollback tag: ${TAG}"
          echo "Note: This tag is informational only — no pushed images are reverted."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${{ github.sha }}"
          git push origin "${TAG}"
