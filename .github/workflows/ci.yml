name: OpenClaw CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-type:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --select E,W,F --ignore E501 --exclude dashboard/web

      - name: Compile all Python files
        run: |
          find . -name "*.py" \
            -not -path "./dashboard/web/*" \
            -not -path "./.git/*" \
            | xargs python -m py_compile

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt pytest pytest-cov

      - name: Run unit tests
        env:
          DEMO_MODE: "true"
          DASHBOARD_SECRET: "ci-test-secret"
        run: |
          pytest tests/ \
            --ignore=tests/chaos \
            -v --tb=short \
            --cov=. --cov-report=term-missing \
            --cov-fail-under=40

  chaos-tests:
    name: Chaos Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt pytest

      - name: Run chaos tests
        env:
          DEMO_MODE: "true"
        run: |
          pytest tests/chaos/ -v --tb=short -x

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Bandit security scan
        run: |
          bandit -r . \
            --exclude ./dashboard/web,./.git,./tests \
            -ll -ii \
            --skip B101,B311 \
            -f txt

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openclaw:ci .

      - name: Verify image starts
        run: |
          docker run --rm -e DEMO_MODE=true -e DASHBOARD_SECRET=ci \
            openclaw:ci python -c "
          import trading.cryptocom_bot
          import runtime.reconciliation
          import risk.portfolio_risk
          import runtime.metrics
          import runtime.replay_validator
          import runtime.shadow_optimization
          print('All Phase 2 modules import OK')
          "
